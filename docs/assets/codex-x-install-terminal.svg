  <text x="292" y="204" fill="#94A3B8" font-size="22" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">one-command install</text>

  <text x="184" y="294" fill="#E2E8F0" font-size="28" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">$ bash &lt;(curl -fsSL https://raw.githubusercontent.com/armysheng/codex-x/main/install.sh)</text>
  <text x="184" y="354" fill="#94A3B8" font-size="24" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">Cloning into '/Users/demo/codex-x'...</text>
  <text x="184" y="402" fill="#94A3B8" font-size="24" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">added 3 packages in 1s</text>
  <text x="184" y="450" fill="#94A3B8" font-size="24" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">Initialized codex-x workspace at /Users/demo/codex-x/my-workspace</text>

  <text x="184" y="530" fill="#67E8F9" font-size="24" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">codex-x installed successfully.</text>
  <text x="184" y="588" fill="#E2E8F0" font-size="24" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">Repo: /Users/demo/codex-x</text>
  <text x="184" y="630" fill="#E2E8F0" font-size="24" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">Workspace: /Users/demo/codex-x/my-workspace</text>
  <text x="184" y="688" fill="#A5F3FC" font-size="24" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">Next: cd /Users/demo/codex-x/my-workspace &amp;&amp; codex</text>

  <text x="184" y="760" fill="#94A3B8" font-size="20" font-family="Inter, ui-sans-serif, system-ui, sans-serif">A single command clones the repo, installs dependencies, and bootstraps a memory-first workspace.</text>
