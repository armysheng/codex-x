<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1500" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="card" x1="280" y1="220" x2="1320" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="180" y="150" width="1240" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1340" cy="160" r="220" fill="#0EA5E9" fill-opacity="0.12"/>
  <circle cx="220" cy="860" r="260" fill="#14B8A6" fill-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="220" y="190" width="1160" height="620" rx="36" fill="url(#card)" stroke="#334155" stroke-width="1.5"/>
  </g>

  <rect x="220" y="190" width="1160" height="78" rx="36" fill="#0B1220"/>
  <circle cx="270" cy="229" r="8" fill="#F87171"/>
  <circle cx="298" cy="229" r="8" fill="#FBBF24"/>
  <circle cx="326" cy="229" r="8" fill="#34D399"/>
  <text x="360" y="236" fill="#94A3B8" font-size="22" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">codex-x</text>

  <text x="260" y="352" fill="white" font-size="68" font-weight="700" font-family="Inter, ui-sans-serif, system-ui, sans-serif">A memory-first toolkit for Codex</text>
  <text x="260" y="410" fill="#CBD5E1" font-size="28" font-family="Inter, ui-sans-serif, system-ui, sans-serif">Give Codex a real workspace, install it in one command, and optionally bridge Feishu into your local workflow.</text>

  <rect x="260" y="470" width="1080" height="94" rx="22" fill="#020617" stroke="#1E293B" stroke-width="1.5"/>
  <text x="298" y="528" fill="#22D3EE" font-size="24" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace">bash &lt;(curl -fsSL https://raw.githubusercontent.com/armysheng/codex-x/main/install.sh)</text>

  <text x="262" y="612" fill="#E2E8F0" font-size="24" font-family="Inter, ui-sans-serif, system-ui, sans-serif">Three modules, one mental model:</text>

  <g>
    <rect x="260" y="646" width="330" height="124" rx="24" fill="#0B1220" stroke="#1E293B"/>
    <text x="286" y="688" fill="#67E8F9" font-size="24" font-weight="700" font-family="Inter, ui-sans-serif, system-ui, sans-serif">workspace-template</text>
    <text x="286" y="726" fill="#CBD5E1" font-size="20" font-family="Inter, ui-sans-serif, system-ui, sans-serif">A clean memory-first workspace</text>
    <text x="286" y="754" fill="#94A3B8" font-size="18" font-family="Inter, ui-sans-serif, system-ui, sans-serif">status · context · daily memory · archive</text>
  </g>

  <g>
    <rect x="625" y="646" width="330" height="124" rx="24" fill="#0B1220" stroke="#1E293B"/>
    <text x="651" y="688" fill="#67E8F9" font-size="24" font-weight="700" font-family="Inter, ui-sans-serif, system-ui, sans-serif">create-codex-x</text>
    <text x="651" y="726" fill="#CBD5E1" font-size="20" font-family="Inter, ui-sans-serif, system-ui, sans-serif">One command bootstrapper</text>
    <text x="651" y="754" fill="#94A3B8" font-size="18" font-family="Inter, ui-sans-serif, system-ui, sans-serif">identity · bootstrap · daily note</text>
  </g>

  <g>
    <rect x="990" y="646" width="350" height="124" rx="24" fill="#0B1220" stroke="#1E293B"/>
    <text x="1016" y="688" fill="#67E8F9" font-size="24" font-weight="700" font-family="Inter, ui-sans-serif, system-ui, sans-serif">feishu-codex-cli</text>
    <text x="1016" y="726" fill="#CBD5E1" font-size="20" font-family="Inter, ui-sans-serif, system-ui, sans-serif">Optional message entrypoint</text>
    <text x="1016" y="754" fill="#94A3B8" font-size="18" font-family="Inter, ui-sans-serif, system-ui, sans-serif">doctor · smoke · start · stop · send</text>
  </g>

  <text x="260" y="872" fill="#94A3B8" font-size="20" font-family="Inter, ui-sans-serif, system-ui, sans-serif">Built for developers who want Codex to remember context without building a whole platform first.</text>
</svg>
